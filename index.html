## 涂鸦

- 《筷子》
> “筷子干净，因为有我。”  
> 餐具包装纸这么想着  
> 但是最终被眼前的不明生物  
> 在“何❤️意味”的律令之下扯碎🥵  
> 临行时，它又看见那双手  
> 那双手是把它轻轻地从筷子上拆下来的手🥰  
> 可现在早已被饱腹感夺舍  
> 变成了处理厨余垃圾的工具😭  
> 垃圾桶里，它伤心  
> 但是伤心也不过某个极小的值  
> 因为它的生机早已断绝  
> 不能再被寄托上任何感情😇
