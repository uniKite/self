    <title>渺月构成</title>
    <!-- 引入GitHub Markdown样式 -->
    <link rel="stylesheet" href="/env/github-markdown-light.min.css">
    <!-- 引入Marked.js库 -->
    <script src="/env/marked.umd.js"></script>
    <style>
        /* 基础样式设置 */
        body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: auto;
        }
        
        /* 确保只显示Markdown内容 */
        body > :not(.markdown-body) {
            display: none;
        }
        
        /* GitHub风格样式调整 */
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 30px;
        }
        
        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }

        details {
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: white;
            overflow: hidden;
        }
        
        summary {
            padding: 12px 15px;
            cursor: pointer;
            font-weight: 600;
            background-color: #f1f8ff;
            border-bottom: 1px solid transparent;
            transition: background-color 0.3s;
        }
        
        summary:hover {
            background-color: #e3f2fd;
        }
        
        details[open] summary {
            border-bottom-color: #ddd;
            background-color: #e3f2fd;
        }
        
        .content {
            padding: 15px;
            line-height: 1.6;
        }
        
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

    </style>
</head>
<body>
    <!-- Markdown内容容器 -->
    <div id="content" class="markdown-body"></div>
    
    <!-- 嵌入您的Markdown内容 -->
    <script id="markdown-content" type="text/markdown">

<script>
    // 页面加载完成后渲染Markdown
    document.addEventListener('DOMContentLoaded', function() {
        // 获取Markdown内容
        const markdownContent = document.getElementById('markdown-content').textContent;
        // 使用marked.js解析Markdown
        const htmlContent = marked.parse(markdownContent);
        // 将解析后的内容插入到容器中
        document.getElementById('content').innerHTML = htmlContent;
    });
</script>
