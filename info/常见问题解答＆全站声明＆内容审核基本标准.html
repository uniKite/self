# 常见问题解答&全站声明&内容审核基本标准


## 常见问题解答（版本1.1.0.25.10）
> 问：为什么网站的页面这么简陋？明明网上有很多模板和框架，为什么不用？    
> 答：有以下几个原因：  
> - 本网站**没有专门的服务器**，经常在不同的机器之间迁移。它们有着不同的软件环境、操作系统甚至是硬件架构，所以使用简单的结构是非常有必要的  
> - 本站的带宽、流量和服务器资源有限，设计简单的页面有助于节省资源。如果您正在使用数据流量访问本网站，那么这同样会为您节省很多的流量  
> - 设计简单的页面可以让老旧设备轻松访问，这在很多时候是十分重要的

> 问：网站里面都有什么东西？  
> 答：以虚构的文学作品为主，可能会穿插少量图片

> 问：我能注册/登录/点赞/评论/分享吗？  
> 答：本网站是一个静态网站，这意味着您无法注册或登录，也无法进行任何能够改变网站内容的操作。但是，通过浏览器内置的分享功能（如果有），您可以分享您喜爱的内容

> 问：这个网站以后会收费吗？  
> 答：不会。本网站提供的所有内容均可在站内永久免费的阅读

> 问：为什么要使用海外节点？  
> 答：国内的节点配置的时候比较麻烦
