name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.131.0'
          extended: true
      
      - name: Debug: Show directory structure
        run: |
          echo "Current directory:"
          pwd
          ls -la
          echo "Content directory:"
          ls -la content/ || echo "No content directory"
          echo "Themes directory:"
          ls -la themes/ || echo "No themes directory"
      
      - name: Setup Ananke Theme
        run: |
          echo "Setting up Ananke theme..."
          if [ ! -d "themes/ananke" ]; then
            echo "Cloning Ananke theme..."
            git clone --depth 1 --branch master \
              https://github.com/theNewDynamic/gohugo-theme-ananke.git \
              themes/ananke
            echo "Theme cloned successfully"
          else
            echo "Theme already exists"
          fi
          
          echo "Theme contents:"
          ls -la themes/ananke/ || echo "Theme directory not accessible"
      
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: |
          echo "Building Hugo site..."
          echo "Hugo version:"
          hugo version
          
          echo "Checking theme configuration..."
          if [ -f "hugo.toml" ]; then
            echo "hugo.toml content:"
            cat hugo.toml
          fi
          
          echo "Starting Hugo build..."
          hugo \
            --verbose \
            --minify \
            --baseURL "https://pangxu.net/"
          
          echo "Build completed. Public directory contents:"
          ls -la public/ || echo "No public directory"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
